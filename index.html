      <div id="score"></div>

  </div>

  <div id="status">pronto</div>
</div>

<script>
(function() {
  'use strict';

  const VF = Vex.Flow;

  const state = {
    duration: 'q',
    dotted: false,
    rest: false,
    accidental: null,
    notes: [],
    measureCount: 4,
    beatsPerMeasure: 4,
    beatUnit: 4,
    selectedIndex: -1,
    history: []
  };

  const HISTORY_LIMIT = 50;

  const pushHistory = () => {
    state.history.push(JSON.stringify({
      notes: state.notes,
      measureCount: state.measureCount
    }));
    if (state.history.length > HISTORY_LIMIT) state.history.shift();
  };

  const undo = () => {
    if (state.history.length === 0) return;
    const snap = JSON.parse(state.history.pop());
    state.notes = snap.notes;
    state.measureCount = snap.measureCount;
    state.selectedIndex = -1;
    render();
  };

  const setStatus = (msg) => {
    document.getElementById('status').textContent = msg;
  };

  const durationToBeats = (d, dotted) => {
    const base = { 'w': 4, 'h': 2, 'q': 1, '8': 0.5, '16': 0.25 }[d];
    return dotted ? base * 1.5 : base;
  };

  const trebleStepFromIndex = (idx) => {
    const scaleLetterToNum = { c:0, d:1, e:2, f:3, g:4, a:5, b:6 };
    const startOctave = 5;
    const startNum = startOctave * 7 + scaleLetterToNum['f'];
    const curNum = startNum - idx;
    const octave = Math.floor(curNum / 7);
    const letterNum = ((curNum % 7) + 7) % 7;
    const letterFromNum = ['c','d','e','f','g','a','b'][letterNum];
    return { letter: letterFromNum, octave: octave };
  };

  const STAVE_WIDTH = 280;
  const STAVE_X_START = 10;
  const STAVE_Y = 40;
  const TOTAL_HEIGHT = 200;

  const totalWidth = () => STAVE_X_START + STAVE_WIDTH * state.measureCount + 20;

  const splitNotesIntoMeasures = () => {
    const measures = Array.from({ length: state.measureCount }, () => []);
    let measureIdx = 0;
    let beatsInCurrent = 0;

    for (let i = 0; i < state.notes.length; i++) {
      const n = state.notes[i];
      const nBeats = durationToBeats(n.duration, n.dots > 0);
      if (measureIdx >= state.measureCount) break;
      if (beatsInCurrent + nBeats > state.beatsPerMeasure + 0.001) {
        measureIdx++;
        beatsInCurrent = 0;
        if (measureIdx >= state.measureCount) break;
      }
      measures[measureIdx].push({ origIndex: i, note: n });
      beatsInCurrent += nBeats;
    }
    return measures;
  };

  let staveLayout = [];
  let noteBBoxes = [];

  const render = () => {
    const scoreDiv = document.getElementById('score');
    scoreDiv.innerHTML = '';

    const W = totalWidth();
    const renderer = new VF.Renderer(scoreDiv, VF.Renderer.Backends.SVG);
    renderer.resize(W, TOTAL_HEIGHT);
    const ctx = renderer.getContext();

    staveLayout = [];
    noteBBoxes = [];

    const measures = splitNotesIntoMeasures();

    for (let m = 0; m < state.measureCount; m++) {
      const x = STAVE_X_START + m * STAVE_WIDTH;
      const stave = new VF.Stave(x, STAVE_Y, STAVE_WIDTH);
      if (m === 0) {
        stave.addClef('treble').addTimeSignature(state.beatsPerMeasure + '/' + state.beatUnit);
      }
      stave.setContext(ctx).draw();

      const measureData = measures[m];
      const vfNotes = [];
      const origIndexByVfIndex = [];

      measureData.forEach((entry) => {
        const n = entry.note;
        const durStr = n.duration + (n.isRest ? 'r' : '');
        const sn = new VF.StaveNote({
          keys: n.isRest ? ['b/4'] : n.keys,
          duration: durStr
        });
        if (n.dots > 0) VF.Dot.buildAndAttach([sn], { all: true });
        if (!n.isRest) {
          (n.accidentals || []).forEach((a, i) => {
            if (a) sn.addModifier(new VF.Accidental(a), i);
          });
        }
        vfNotes.push(sn);
        origIndexByVfIndex.push(entry.origIndex);
      });

      if (vfNotes.length === 0) {
        vfNotes.push(new VF.StaveNote({ keys: ['b/4'], duration: 'wr' }));
        origIndexByVfIndex.push(-1);
      }

      try {
        const voice = new VF.Voice({ num_beats: state.beatsPerMeasure, beat_value: state.beatUnit })
          .setStrict(false)
          .addTickables(vfNotes);
        new VF.Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 40);
        voice.draw(ctx, stave);

        vfNotes.forEach((sn, vfIdx) => {
          const origIndex = origIndexByVfIndex[vfIdx];
          if (origIndex < 0) return;
          const bb = sn.getBoundingBox();
          if (!bb) return;
          noteBBoxes.push({
            origIndex,
            x: bb.getX(),
            y: bb.getY(),
            w: bb.getW(),
            h: bb.getH()
          });
        });

      } catch (err) {
        console.warn('Render measure error:', err);
      }

      staveLayout.push({ stave, measureIdx: m, x });
    }

    if (state.selectedIndex >= 0) {
      const bb = noteBBoxes.find(b => b.origIndex === state.selectedIndex);
      if (bb) {
        const pad = 4;
        ctx.save();
        ctx.setStrokeStyle('#2c6cc9');
        ctx.setLineWidth(2);
        ctx.setFillStyle('rgba(44,108,201,0.15)');
        ctx.fillRect(bb.x - pad, bb.y - pad, bb.w + 2*pad, bb.h + 2*pad);
        ctx.rect(bb.x - pad, bb.y - pad, bb.w + 2*pad, bb.h + 2*pad);
        ctx.stroke();
        ctx.restore();
      }
    }

    document.getElementById('score-svg-wrapper').style.width = W + 'px';

    setStatus(
      `note: ${state.notes.length} | batt: ${state.measureCount} | dur: ${labelDur()}` +
      `${state.rest ? ' [PAUSA]' : ''}${state.accidental ? ' alt:'+state.accidental : ''}${state.dotted ? ' ·' : ''}` +
      `${state.selectedIndex >= 0 ? ' | SEL #'+state.selectedIndex : ''}`
    );
  };

  const labelDur = () => ({ 'w': 'int', 'h': '1/2', 'q': '1/4', '8': '1/8', '16': '1/16' }[state.duration]);

  const findNoteAt = (x, y) => {
    const pad = 8;
    for (const b of noteBBoxes) {
      if (x >= b.x - pad && x <= b.x + b.w + pad &&
          y >= b.y - pad && y <= b.y + b.h + pad) {
        return b.origIndex;
      }
    }
    return -1;
  };

  const pitchFromY = (y) => {
    if (staveLayout.length === 0) return { letter: 'b', octave: 4 };
    const firstStave = staveLayout[0].stave;
    const topLineY = firstStave.getYForLine(0);
    const lineSpacing = firstStave.getYForLine(1) - firstStave.getYForLine(0);
    const stepSpacing = lineSpacing / 2;
    const diatonicStep = Math.round((y - topLineY) / stepSpacing);
    const clamped = Math.max(-6, Math.min(16, diatonicStep));
    return trebleStepFromIndex(clamped);
  };

  const scoreWrapper = document.getElementById('score-svg-wrapper');

  scoreWrapper.addEventListener('pointerdown', (e) => {
    const rect = scoreWrapper.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const hitIdx = findNoteAt(x, y);

    if (hitIdx >= 0) {
      if (state.selectedIndex === hitIdx) {
        const n = state.notes[hitIdx];
        if (!n.isRest) {
          const newPitch = pitchFromY(y);
          pushHistory();
          n.keys = [newPitch.letter + '/' + newPitch.octave];
          if (state.accidental) {
            n.accidentals = [state.accidental];
            state.accidental = null;
            updatePaletteUI();
          }
        }
      } else {
        state.selectedIndex = hitIdx;
      }
      render();
      return;
    }

    if (state.selectedIndex >= 0) {
      state.selectedIndex = -1;
      render();
      return;
    }

    const pitch = pitchFromY(y);
    pushHistory();
    const note = {
      keys: state.rest ? [] : [pitch.letter + '/' + pitch.octave],
      duration: state.duration,
      dots: state.dotted ? 1 : 0,
      accidentals: [state.accidental],
      isRest: state.rest
    };
    state.notes.push(note);
    if (state.accidental) {
      state.accidental = null;
      updatePaletteUI();
    }
    render();
  });

  const updatePaletteUI = () => {
    document.querySelectorAll('[data-duration]').forEach(b => {
      b.classList.toggle('active', b.dataset.duration === state.duration);
    });
    document.querySelectorAll('[data-acc]').forEach(b => {
      b.classList.toggle('active', b.dataset.acc === state.accidental);
    });
    document.getElementById('btn-dot').classList.toggle('active', state.dotted);
    document.getElementById('btn-rest').classList.toggle('active', state.rest);
  };

  document.querySelectorAll('[data-duration]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.duration = btn.dataset.duration;
      if (state.selectedIndex >= 0) {
        pushHistory();
        state.notes[state.selectedIndex].duration = state.duration;
      }
      updatePaletteUI();
      render();
    });
  });

  document.querySelectorAll('[data-acc]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.accidental = (state.accidental === btn.dataset.acc) ? null : btn.dataset.acc;
      if (state.selectedIndex >= 0) {
        const n = state.notes[state.selectedIndex];
        if (!n.isRest) {
          pushHistory();
          n.accidentals = [state.accidental];
          state.accidental = null;
        }
      }
      updatePaletteUI();
      render();
    });
  });

  document.getElementById('btn-dot').addEventListener('click', () => {
    state.dotted = !state.dotted;
    if (state.selectedIndex >= 0) {
      pushHistory();
      state.notes[state.selectedIndex].dots = state.dotted ? 1 : 0;
    }
    updatePaletteUI();
    render();
  });

  document.getElementById('btn-rest').addEventListener('click', () => {
    state.rest = !state.rest;
    updatePaletteUI();
    render();
  });

  document.getElementById('btn-undo').addEventListener('click', () => {
    undo();
  });

  document.getElementById('btn-delete').addEventListener('click', () => {
    if (state.selectedIndex < 0) return;
    pushHistory();
    state.notes.splice(state.selectedIndex, 1);
    state.selectedIndex = -1;
    render();
  });

  document.getElementById('btn-add-measure').addEventListener('click', () => {
    pushHistory();
    state.measureCount++;
    render();
    const cont = document.getElementById('score-container');
    cont.scrollLeft = cont.scrollWidth;
  });

  document.getElementById('btn-remove-measure').addEventListener('click', () => {
    if (state.measureCount <= 1) return;
    pushHistory();
    state.measureCount--;
    const beatsCapacity = state.measureCount * state.beatsPerMeasure;
    let used = 0;
    let cutIdx = state.notes.length;
    for (let i = 0; i < state.notes.length; i++) {
      const b = durationToBeats(state.notes[i].duration, state.notes[i].dots > 0);
      if (used + b > beatsCapacity + 0.001) { cutIdx = i; break; }
      used += b;
    }
    if (cutIdx < state.notes.length) {
      state.notes = state.notes.slice(0, cutIdx);
    }
    state.selectedIndex = -1;
    render();
  });

  updatePaletteUI();
  render();

})();
</script>

</body>
