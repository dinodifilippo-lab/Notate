<script>
(function() {
  'use strict';

  // ============================================================
  // NOTATE 0.1.0
  // Build: usabilità base. Un rigo, 4 battute, inserimento note.
  // ============================================================

  const VF = Vex.Flow;

  // ---- Stato ----
  const state = {
    duration: 'q',       // durata corrente
    dotted: false,       // punto di valore attivo
    rest: false,         // modalità pausa
    accidental: null,    // '#' | 'b' | 'n' | null
    notes: [],           // array di oggetti nota: {keys:[], duration, dots, accidentals, isRest}
    measureCount: 4,
    beatsPerMeasure: 4,  // 4/4
    beatUnit: 4
  };

  const setStatus = (msg) => {
    document.getElementById('status').textContent = msg;
  };

  // ---- Mappatura durata → beats ----
  const durationToBeats = (d, dotted) => {
    const base = { 'w': 4, 'h': 2, 'q': 1, '8': 0.5, '16': 0.25 }[d];
    return dotted ? base * 1.5 : base;
  };

  // ---- Calcolo "pitch" da Y coordinate ----
  // VexFlow line 0 = top line (F5 in treble), line 4 = bottom line (E4)
  // Ogni step verticale = mezzo spazio di rigo = una nota diatonica
  // Mappa treble clef lines: line 0 (top) = F5, space = E5, line 1 = D5, ...
  // Approccio: il rigo ha 5 linee. In treble:
  //   top line = F5, poi scendendo E5, D5, C5, B4, A4, G4, F4, E4 (bottom line)
  // Considero anche ledger lines sopra/sotto.
  // Y di riferimento: posizione della top line (F5)

  const trebleStepFromIndex = (idx) => {
    // idx = 0 corrisponde a F5 (top line). Scendendo, idx+1 = E5, ecc.
    // Sistema: lettere in ordine discendente da F
    const letters = ['f','e','d','c','b','a','g'];
    const startOctave = 5;
    const startLetterIdx = 0; // 'f'
    // Ogni idx sposta di un grado diatonico verso il basso
    const totalStep = startLetterIdx + idx;
    const letter = letters[((totalStep % 7) + 7) % 7];
    // Calcolo ottava: partiamo da F5. Dopo F5,E5,D5,C5 arriva B4 (cambio ottava su B/C boundary)
    // In realtà: F5=5, E5=5, D5=5, C5=5, B4=4, A4=4, G4=4, F4=4, E4=4, D4=4, C4=4, B3=3, ...
    // L'ottava cambia quando si passa da C a B scendendo.
    // Metodo diretto: calcolo valore MIDI-like.
    // F5 ha "pitch index" = 5*7 + 3 (F è la 3a nota in C-D-E-F...) scendiamo di 1 per ogni idx
    const scaleLetterToNum = {c:0,d:1,e:2,f:3,g:4,a:5,b:6};
    const startNum = startOctave * 7 + scaleLetterToNum['f']; // 5*7+3 = 38
    const curNum = startNum - idx;
    const octave = Math.floor(curNum / 7);
    const letterNum = ((curNum % 7) + 7) % 7;
    const letterFromNum = ['c','d','e','f','g','a','b'][letterNum];
    return { letter: letterFromNum, octave: octave };
  };

  // ---- Rendering ----
  let renderer = null;
  let ctx = null;
  let staveLayout = []; // [{stave, noteRange:[startIdx,endIdx], beatsUsed, bbox}]

  const STAVE_WIDTH = 280;
  const STAVE_X_START = 10;
  const STAVE_Y = 40;
  const TOTAL_WIDTH = STAVE_X_START + STAVE_WIDTH * state.measureCount + 20;
  const TOTAL_HEIGHT = 220;

  // Pre-calcolo: divide state.notes in battute secondo beats
  const splitNotesIntoMeasures = () => {
    const measures = Array.from({length: state.measureCount}, () => []);
    let measureIdx = 0;
    let beatsInCurrent = 0;

    for (const n of state.notes) {
      const nBeats = durationToBeats(n.duration, n.dots > 0);
      if (measureIdx >= state.measureCount) break;
      if (beatsInCurrent + nBeats > state.beatsPerMeasure + 0.001) {
        // nota non entra, passa a battuta successiva (semplificazione: no tie automatico)
        measureIdx++;
        beatsInCurrent = 0;
        if (measureIdx >= state.measureCount) break;
      }
      measures[measureIdx].push(n);
      beatsInCurrent += nBeats;
    }
    return measures;
  };

  const render = () => {
    const scoreDiv = document.getElementById('score');
    scoreDiv.innerHTML = '';

    renderer = new VF.Renderer(scoreDiv, VF.Renderer.Backends.SVG);
    renderer.resize(TOTAL_WIDTH, TOTAL_HEIGHT);
    ctx = renderer.getContext();

    staveLayout = [];
    const measures = splitNotesIntoMeasures();

    for (let m = 0; m < state.measureCount; m++) {
      const x = STAVE_X_START + m * STAVE_WIDTH;
      const stave = new VF.Stave(x, STAVE_Y, STAVE_WIDTH);
      if (m === 0) {
        stave.addClef('treble').addTimeSignature(state.beatsPerMeasure + '/' + state.beatUnit);
      }
      stave.setContext(ctx).draw();

      const measureNotes = measures[m];
      const vfNotes = measureNotes.map(n => {
        const durStr = n.duration + (n.isRest ? 'r' : '');
        const sn = new VF.StaveNote({
          keys: n.isRest ? ['b/4'] : n.keys,
          duration: durStr
        });
        if (n.dots > 0) VF.Dot.buildAndAttach([sn], { all: true });
        if (!n.isRest) {
          n.accidentals.forEach((a, i) => {
            if (a) sn.addModifier(new VF.Accidental(a), i);
          });
        }
        return sn;
      });

      // Fill resto della battuta con pause se serve
      let beatsUsed = measureNotes.reduce((s, n) => s + durationToBeats(n.duration, n.dots > 0), 0);
      const remaining = state.beatsPerMeasure - beatsUsed;
      if (remaining > 0 && m === measures.findIndex((mm, i) => i >= 0 && measures.slice(i+1).every(x => x.length === 0)) ) {
        // Nella prima battuta parzialmente piena dopo l'ultima nota, riempi con pause
        // Semplificazione: usa pause di quarto
        const pauseCount = Math.floor(remaining);
        for (let i = 0; i < pauseCount; i++) {
          vfNotes.push(new VF.StaveNote({ keys: ['b/4'], duration: 'qr' }));
        }
      } else if (measureNotes.length === 0) {
        // battuta vuota: pausa intera
        vfNotes.push(new VF.StaveNote({ keys: ['b/4'], duration: 'wr' }));
      }

      try {
        const voice = new VF.Voice({ num_beats: state.beatsPerMeasure, beat_value: state.beatUnit })
          .setStrict(false)
          .addTickables(vfNotes);
        new VF.Formatter().joinVoices([voice]).format([voice], STAVE_WIDTH - 40);
        voice.draw(ctx, stave);
      } catch (err) {
        console.warn('Render measure error:', err);
      }

      staveLayout.push({
        stave,
        x: x,
        y: STAVE_Y,
        width: STAVE_WIDTH,
        measureIdx: m
      });
    }

    setStatus(`note: ${state.notes.length} | durata: ${labelDur()} | ${state.rest ? 'PAUSA ' : ''}${state.accidental ? 'alt:'+state.accidental+' ' : ''}${state.dotted ? '·' : ''}`);
  };

  const labelDur = () => {
    return { 'w': 'int', 'h': '1/2', 'q': '1/4', '8': '1/8', '16': '1/16' }[state.duration];
  };

  // ---- Gestione tap sul rigo ----
  const scoreContainer = document.getElementById('score-svg-wrapper');

  scoreContainer.addEventListener('pointerdown', (e) => {
    const rect = scoreContainer.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Identifica quale battuta (per ora non serve, inseriamo sempre in coda)
    // Identifica pitch da y
    // La top line del rigo in VexFlow è a stave.getYForTopText() circa, ma meglio:
    // stave.getYForLine(0) = top line (F5), ogni linea distante ~10px
    // gli step diatonici sono a mezzo-spazio = ~5px
    if (staveLayout.length === 0) return;

    const firstStave = staveLayout[0].stave;
    const topLineY = firstStave.getYForLine(0); // F5
    const lineSpacing = firstStave.getYForLine(1) - firstStave.getYForLine(0); // ~10px
    const stepSpacing = lineSpacing / 2; // mezzo spazio per step diatonico

    const diatonicStep = Math.round((y - topLineY) / stepSpacing);
    // clamp a range ragionevole: da due ledger lines sopra (step -4) a due sotto (step +14)
    const clamped = Math.max(-6, Math.min(16, diatonicStep));
    const pitch = trebleStepFromIndex(clamped);

    addNoteAtCurrentPosition(pitch);
  });

  const addNoteAtCurrentPosition = (pitch) => {
    const note = {
      keys: state.rest ? [] : [pitch.letter + '/' + pitch.octave],
      duration: state.duration,
      dots: state.dotted ? 1 : 0,
      accidentals: [state.accidental],
      isRest: state.rest
    };
    state.notes.push(note);
    render();
    // reset alterazione dopo l'uso (come nella notazione reale, l'alterazione vale solo per quella nota)
    if (state.accidental) {
      state.accidental = null;
      updatePaletteUI();
    }
  };

  // ---- Palette UI ----
  const updatePaletteUI = () => {
    document.querySelectorAll('[data-duration]').forEach(b => {
      b.classList.toggle('active', b.dataset.duration === state.duration);
    });
    document.querySelectorAll('[data-acc]').forEach(b => {
      b.classList.toggle('active', b.dataset.acc === state.accidental);
    });
    document.getElementById('btn-dot').classList.toggle('active', state.dotted);
    document.getElementById('btn-rest').classList.toggle('active', state.rest);
  };

  document.querySelectorAll('[data-duration]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.duration = btn.dataset.duration;
      updatePaletteUI();
      render();
    });
  });

  document.querySelectorAll('[data-acc]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.accidental = (state.accidental === btn.dataset.acc) ? null : btn.dataset.acc;
      updatePaletteUI();
      render();
    });
  });

  document.getElementById('btn-dot').addEventListener('click', () => {
    state.dotted = !state.dotted;
    updatePaletteUI();
    render();
  });

  document.getElementById('btn-rest').addEventListener('click', () => {
    state.rest = !state.rest;
    updatePaletteUI();
    render();
  });

  document.getElementById('btn-undo').addEventListener('click', () => {
    state.notes.pop();
    render();
  });

  // ---- Init ----
  updatePaletteUI();
  render();

})();
</script>
